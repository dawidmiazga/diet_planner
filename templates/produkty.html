{% extends "base.html" %}

{% block title %}Lista produktów{% endblock %}

{% block content %}

<div class="toolbar">
    <div class="toolbar-left">
        <div class="filter-group">
            <div class="filter-with-clear" id="productFilterWrapper">
                <input type="text" id="filterNazwa" class="modern-input" placeholder="🔍 Szukaj produktu...">
                <button type="button" id="clearProductFilter" class="clear-filter-btn">✕</button>
            </div>
        </div>
    </div>

    <div class="toolbar-center">
        <button class="btn main-btn animate-btn" onclick="Products.openAddPopup()">
            + Dodaj produkt
        </button>
    </div>

    <div class="toolbar-spacer"></div>
</div>

<div class="card no-hover">
    <table class="modern-table" id="productsTable">
        <thead>
            <tr>
                <th onclick="ProductsUI.sortTable(0, false)">Nazwa <span class="sort-icon">▲▼</span></th>
                <th onclick="ProductsUI.sortTable(1, false)">Dział <span class="sort-icon">▲▼</span></th>
                <th onclick="ProductsUI.sortTable(2, false)">Jednostka <span class="sort-icon">▲▼</span></th>
                <th onclick="ProductsUI.sortTable(3, false)">Lodówka <span class="sort-icon">▲▼</span></th>
                <th onclick="ProductsUI.sortTable(4, true)">Kcal <span class="sort-icon">▲▼</span></th>
                <th onclick="ProductsUI.sortTable(5, true)">B <span class="sort-icon">▲▼</span></th>
                <th onclick="ProductsUI.sortTable(6, true)">T <span class="sort-icon">▲▼</span></th>
                <th onclick="ProductsUI.sortTable(7, true)">W <span class="sort-icon">▲▼</span></th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="{{ url_for('static', filename='js/products.js') }}">
    // document.addEventListener("DOMContentLoaded", () => {
    //     Controller.init();
    // });
</script>

{% endblock %}
