{% extends "base.html" %}

{% block title %}Dania{% endblock %}

{% block content %}


<div class="toolbar">
    <div class="toolbar-left">
        <div class="filters">
            <div class="filter-with-clear">
                <input type="text" id="mealFilterInput" class="modern-input" placeholder="🔍 Szukaj dania...">
                <button id="clearMealFilter" class="clear-filter-btn">✕</button>
            </div>
        </div>
    </div>

    <!-- <div class="toolbar-center"> -->

    <div class="toolbar-center-tabs">
        <div class="tabs" id="personTabs">
            <div class="tab active" onclick="Dishes.setPerson('osoba1', this)">Dawid</div>
            <div class="tab" onclick="Dishes.setPerson('osoba2', this)">Kasia</div>
        </div>

        <div class="tabs-dishes" id="dayTabs"></div>
    </div>
    <!-- </div> -->

    <div class="toolbar-spacer">
        <button class="btn main-btn animate-btn" onclick="Dishes.openAddForm()">
            <span class="plus-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
                    <path d="M4 20h4l10-10a2.8 2.8 0 0 0-4-4L4 16v4z" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </span>
            Dodaj danie
        </button>
    </div>
</div>

<div class="grid" id="mealsGrid">
    Brak dań 😢
</div>

<script src="{{ url_for('static', filename='js/dishes.js') }}"></script>

{% endblock %}
