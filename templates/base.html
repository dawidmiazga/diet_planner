<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Moja Aplikacja{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>

<body>
    <div class="container">
        <nav class="main-nav" id="mainNav">
            <div class="nav-highlight" id="navHighlight"></div>
            <a class="nav-link {% if request.path in ['/', '/planner'] %}active{% endif %}" href="/">Planner</a>
            <a class="nav-link {% if request.path == '/zakupy' %}active{% endif %}" href="/zakupy">Lista zakupów</a>
            <a class="nav-link {% if request.path == '/dania' %}active{% endif %}" href="/dania">Dania</a>
            <a class="nav-link {% if request.path == '/produkty' %}active{% endif %}" href="/produkty">Lista
                produktów</a>
        </nav>

        <main class="page-content" id="pageContent">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <!-- Modal wyboru składnika z products.json -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header fancy-header">
                <h3>Wybierz składnik</h3>
            </div>

            <button type="button" class="fancy-close-btn" onclick="Modal.closeProductModal()" aria-label="Zamknij">
                <span class="close-icon">✕</span>
            </button>

            <input type="text" id="productSearch" placeholder="Szukaj produktu..."
                style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e5e7eb;">

            <div id="productsList" style="max-height: 300px; overflow-y: auto;"></div>
 
            <label>Ilość (gram):</label>
            <input type="number" id="productGrams" placeholder="g" value="0" min="0">

            <div class="modal-buttons">
                <button type="button" class="btn save-btn" onclick="Modal.selectProduct()">Dodaj</button>
            </div>
        </div>
    </div>

    <!-- Popup edycji produktu -->
    <div class="modal" id="editProductModal">
        <div class="modal-content modal-product-form">
            <div class="modal-header fancy-header">
                <h3 id="editModalTitle"></h3>
            </div>

            <button type="button" class="fancy-close-btn" onclick="Modal.closeEditPopup()" aria-label="Zamknij">
                <span class="close-icon">✕</span>
            </button>

            <form id="editForm">
                <input type="hidden" id="edit_id">

                <div class="form-field full-width">
                    <label>Nazwa produktu</label>
                    <input type="text" id="edit_nazwa" class="modern-input">
                </div>

                <div class="form-field">
                    <label>Jednostka</label>
                    <select id="edit_jednostka" class="modern-input">
                        {% for j in jednostki %}
                        <option value="{{ j }}">{{ j }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-field">
                    <label>Ilość gram w jednostce</label>
                    <input type="number" id="edit_gramy" class="modern-input" step="any">
                </div>

                <div class="form-field">
                    <label for="edit_dzial">Dział w sklepie</label>
                    <select id="edit_dzial" class="modern-input">
                        <option value="">-- wybierz dział --</option>
                        {% for dzial in dzialy %}
                        <option value="{{ dzial }}">{{ dzial }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-field">
                    <label>Czy w lodówce?</label>
                    <select id="edit_lodowka" class="modern-input">
                        <option value="Tak">Tak</option>
                        <option value="Nie">Nie</option>
                        <option value="Tak/Nie">Tak/Nie</option>
                    </select>
                </div>

                <div class="macro-section">
                    <div class="macro-title">Makroskładniki (na 100g)</div>
                    <div class="macro-grid">
                        <div class="form-field">
                            <label>Kcal</label>
                            <input type="number" id="edit_kcal" class="modern-input" step="any">
                        </div>

                        <div class="form-field">
                            <label>Białko</label>
                            <input type="number" id="edit_b" class="modern-input" step="any">
                        </div>

                        <div class="form-field">
                            <label>Tłuszcz</label>
                            <input type="number" id="edit_t" class="modern-input" step="any">
                        </div>

                        <div class="form-field">
                            <label>Węglowodany</label>
                            <input type="number" id="edit_w" class="modern-input" step="any">
                        </div>
                    </div>
                </div>

                <div class="modal-buttons">
                    <button type="submit" class="btn save-btn" id="modalSubmitBtn">Zapisz</button>
                    <button type="button" class="btn red-btn" onclick="Modal.closeEditPopup()">Anuluj</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="deletePopup">
        <div class="modal-content modal-delete-product">
            <div class="modal-header fancy-header">
                <h3>Usunąć produkt?</h3>
            </div>

            <button type="button" class="fancy-close-btn" onclick="Modal.closeDeletePopup()" aria-label="Zamknij">
                <span class="close-icon">✕</span>
            </button>

            <p id="deleteMessage"></p>

            <div class="modal-buttons">
                <button id="deleteYes" class="btn red-btn">Usuń</button>
                <button id="deleteNo" class="btn cancel-btn">Anuluj</button>
            </div>
        </div>
    </div>

    <div class="modal" id="successPopup">
        <div class="modal-content">
            <div class="modal-header fancy-header">
                <h3>Produkt dodany!</h3>
            </div>

            <button type="button" class="fancy-close-btn" onclick="Modal.closeSuccessPopup()" aria-label="Zamknij">
                <span class="close-icon">✕</span>
            </button>

            <p>Czy chcesz dodać nowy produkt?</p>

            <div class="modal-buttons">
                <button id="addAnotherYes" class="main-btn">Tak</button>
                <button id="addAnotherNo" class="red-btn">Nie</button>
            </div>
        </div>
    </div>

    <!-- Modal wyboru dania (Planner) -->
    <div class="modal" id="plannerMealModal">
        <div class="modal-content">
            <div class="modal-header fancy-header">
                <h3>Wybierz danie</h3>
            </div>

            <button type="button" class="fancy-close-btn" onclick="Modal.closePlannerMealModal()" aria-label="Zamknij">
                <span class="close-icon">✕</span>
            </button>

            <input type="hidden" id="cellDish">
            <input type="hidden" id="cellDate">

            <input type="text" id="mealSearch" placeholder="Szukaj dan..." class="meal-search-input">

            <div class="rating-filter-wrapper">
                <div id="ratingFilter" class="rating-filter"></div>
                <button id="clearRatingFilter" type="button" class="clear-rating-btn">✕</button>
            </div>

            <div id="mealTiles" class="meal-tiles"></div>
        </div>
    </div>

    <!-- Modal opisu dania (Planner) -->
    <div class="modal" id="mealDescriptionModal">
        <div class="modal-content">
            <div class="modal-header fancy-header" style="display:flex; align-items:center; gap:15px;">
                <h3 id="descriptionTitle"></h3>

                <button id="editMealFromPreviewBtn" class="btn main-btn animate-btn" style="display:none;">
                    <span class="plus-icon">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
                            <path d="M4 20h4l10-10a2.8 2.8 0 0 0-4-4L4 16v4z" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </span>
                    Edytuj
                </button>
            </div>

            <button type="button" class="fancy-close-btn" onclick="Modal.closeDescriptionModal()" aria-label="Zamknij">
                <span class="close-icon">✕</span>
            </button>

            <div id="descriptionContent" class="meal-description-layout">
                <div id="mealDescriptionLeft" class="meal-description-left">
                    <div id="mealMacros" class="macro-preview"></div>
                </div>
                <div id="mealDescriptionRight" class="meal-description-right"></div>
            </div>
        </div>
    </div>

    <!-- Modal przeniesiony poza container, zawsze na środku ekranu -->
    <div class="modal" id="mealModal">
        <div class="modal-content modal-meal-layout">
            <div class="modal-title-with-stars">
                <!-- <h3>Edytuj danie</h3>                 -->
                <h3 id="editModalTitleMeal"></h3>
                <div id="mealRating" class="star-rating">
                    <span data-value="1"></span>
                    <span data-value="2"></span>
                    <span data-value="3"></span>
                    <span data-value="4"></span>
                    <span data-value="5"></span>
                </div>
            </div>

            <button type="button" class="fancy-close-btn" onclick="Modal.closeModal()" aria-label="Zamknij">
                <span class="close-icon">✕</span>
            </button>

            <input type="hidden" id="mealId">

            <div class="meal-modal-grid">
                <div class="meal-left">
                    <label>Nazwa</label>
                    <input type="text" id="mealName" class="modern-input">

                    <label>Osoba</label>
                    <div id="mealPersonSelection" class="dish-selection"></div>

                    <label>Numer dania</label>
                    <div id="dishSelection" class="dish-selection"></div>

                    <label>Opis</label>
                    <textarea id="mealDescription" class="modal-mealDescription"></textarea>
                </div>

                <div class="meal-right">
                    <div id="mealMacrosEdit" class="macro-preview"></div>
                    <div class="ingredients-header">
                        <label>Składniki</label>
                        <button type="button" class="btn main-btn animate-btn" onclick="Modal.openProductModal()">+
                            Dodaj</button>
                    </div>
                    <div id="ingredientsContainer" class="ingredients-list"></div>
                </div>
            </div>

            <div class="modal-buttons">
                <button type="button" class="btn save-btn" onclick="ModalShared.saveMeal()">Zapisz</button>
                <button type="button" class="btn red-btn" id="deleteMealBtn" onclick="Modal.confirmDeleteMeal()">Usuń</button>
            </div>
        </div>
    </div>

    <div class="modal" id="unsavedChangesModal">
        <div class="modal-content">

            <div class="modal-header fancy-header">
                <h3>Niezapisane zmiany</h3>
            </div>

            <p style="margin:20px 0;">
                Masz niezapisane zmiany w plannerze.
                Co chcesz zrobić?
            </p>

            <div class="modal-buttons">
                <button type="button" class="btn save-btn" id="saveAndLeaveBtn">
                    💾 Zapisz i przejdź
                </button>

                <button type="button" class="btn red-btn" id="discardAndLeaveBtn">
                    🚪 Opuść bez zapisu
                </button>

                <button type="button" class="btn cancel-btn" id="stayOnPageBtn">
                    ↩ Zostań
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="copyDayModal">
    <div class="modal-content">
        <div class="modal-header fancy-header">
            <h3>Kopiuj dzień</h3>
        </div>

        <input type="hidden" id="copyFromDate">

        <label>Wybierz datę docelową:</label>
        <input type="text" id="copyToDate" class="modern-input">

        <div class="modal-buttons">
            <button type="button" class="btn save-btn" onclick="Planner.confirmCopyDay()">OK</button>
            <button type="button" class="btn cancel-btn" onclick="closeModalElement($('copyDayModal'))">Anuluj</button>
        </div>
    </div>
</div>
    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pl.js"></script>
    <script src="{{ url_for('static', filename='js/base.js') }}"></script>
    <script src="{{ url_for('static', filename='js/shared/macro.js') }}"></script>
    <script src="{{ url_for('static', filename='js/shared/mealModal.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/modal.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/notice.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/tableSort.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/datepicker.js') }}"></script>
</body>

</html>
